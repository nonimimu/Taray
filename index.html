<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA RAY STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3G85TUx08gNtnZeJFh8167IJwpHa-Gkw",
            authDomain: "tabay-f23b5.firebaseapp.com",
            databaseURL: "https://tabay-f23b5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tabay-f23b5",
            storageBucket: "tabay-f23b5.firebasestorage.app",
            messagingSenderId: "846273537826",
            appId: "1:846273537826:web:175184b06beb512824677b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbOnValue = onValue;
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        starry: { deep: '#0C1446', indigo: '#2B5C92', soft: '#B3CDE0' },
                        ocean: { dark: '#003B5C', bright: '#0095D9' },
                        accent: { miku: '#00f0ff' }
                    },
                    boxShadow: { 'glow-miku': '0 0 20px rgba(0, 240, 255, 0.3)' }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Mitr', sans-serif !important;
            background-color: #0C1446;
            color: #ffffff;
            background-image: radial-gradient(circle at 10% 20%, #2B5C92 0%, transparent 40%), radial-gradient(circle at 90% 80%, #003B5C 0%, transparent 40%);
            background-attachment: fixed;
        }
        .eng-heading { font-family: 'Playfair Display', serif !important; }
        .glass-card { background: rgba(12, 20, 70, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(179, 205, 224, 0.1); }
        .heading-underline { position: relative; display: inline-flex; padding-bottom: 12px; }
        .heading-underline::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 50%; height: 2px; background: linear-gradient(90deg, transparent, #00f0ff, transparent); box-shadow: 0 0 15px #00f0ff; border-radius: 99px; }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="antialiased min-h-screen pb-20" id="main-body">

    <main class="max-w-3xl mx-auto px-4 py-10 flex flex-col gap-8">
        
        <header class="text-center space-y-4 flex flex-col items-center">
            <div class="relative w-32 h-32 md:w-40 md:h-40 group">
                <div class="absolute inset-0 bg-accent-miku/20 rounded-full blur-2xl animate-pulse"></div>
                <img id="display-logo" src="https://i.postimg.cc/HLBk00nV/mi-m-ch-x-8-20260408220728.png" class="w-full h-full object-cover rounded-full border-2 border-accent-miku shadow-glow-miku relative z-10 transition-transform duration-500 group-hover:scale-105">
                
                <div class="admin-only absolute -bottom-10 left-1/2 -translate-x-1/2 w-64 z-50">
                    <input type="text" id="input-logo-url" placeholder="วาง URL โลโก้ใหม่..." class="w-full bg-black border border-accent-miku rounded-lg p-2 text-[10px] text-white focus:outline-none">
                    <button onclick="saveLogo()" class="w-full bg-accent-miku text-black text-[10px] font-bold py-1 mt-1 rounded uppercase">Update Logo</button>
                </div>
            </div>
            <div class="pt-6">
                <h1 class="eng-heading text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white via-accent-miku to-ocean-bright tracking-tighter drop-shadow-2xl uppercase">
                    TA RAY STORE
                </h1>
                <p class="text-starry-soft/60 text-xs tracking-[0.4em] uppercase mt-2">Premium Gaming Service</p>
            </div>
        </header>

        <section class="flex flex-col gap-6">
            <div class="glass-card p-3 rounded-[2.5rem] overflow-hidden">
                <img id="display-rate-img" src="https://via.placeholder.com/800x1200/000?text=Loading+Rate+Card..." class="w-full rounded-[2.2rem] shadow-2xl">
                <div class="admin-only p-4 mt-2 bg-black/30 rounded-2xl">
                    <label class="text-[10px] text-accent-miku uppercase font-bold">URL รูปภาพเรทราคา:</label>
                    <input type="text" id="input-rate-img" class="w-full bg-starry-deep border border-white/10 rounded-xl p-3 text-sm mt-1 mb-2 outline-none focus:border-accent-miku">
                    <button onclick="saveImage()" class="w-full bg-ocean-bright text-white py-2 rounded-xl text-xs font-bold shadow-lg">บันทึกรูปเรทราคา</button>
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] border-l-4 border-accent-miku relative">
                <h3 class="text-xl font-bold mb-4 text-white flex items-center gap-2">
                    <span class="w-2 h-2 bg-accent-miku rounded-full"></span> เงื่อนไขการฝากขาย
                </h3>
                <div id="display-conditions" class="text-starry-soft text-sm leading-relaxed whitespace-pre-wrap italic">
                    กำลังโหลดข้อมูล...
                </div>
                <div class="admin-only mt-6 pt-6 border-t border-white/10">
                    <label class="text-[10px] text-accent-miku uppercase font-bold">แก้ไขข้อความเงื่อนไข:</label>
                    <textarea id="input-conditions" rows="5" class="w-full bg-starry-deep border border-white/10 rounded-xl p-4 text-sm mt-1 mb-2 outline-none focus:border-accent-miku"></textarea>
                    <button onclick="saveConditions()" class="w-full bg-white text-black py-2 rounded-xl text-xs font-bold">บันทึกข้อความ</button>
                </div>
            </div>
        </section>

        <section class="glass-card p-8 rounded-[3rem] border-t-2 border-t-accent-miku shadow-glow-miku">
            <h3 class="text-2xl text-center text-white mb-8 heading-underline font-black uppercase tracking-widest">Calculator</h3>
            <div class="flex gap-3 mb-8">
                <button onclick="setCalcMode('sell')" id="btn-sell" class="flex-1 py-4 rounded-2xl border-2 border-accent-miku bg-accent-miku/20 text-white font-bold transition-all">ฝากขาย</button>
                <button onclick="setCalcMode('find')" id="btn-find" class="flex-1 py-4 rounded-2xl border-2 border-white/5 text-starry-soft hover:bg-white/5 transition-all font-bold">ฝากหา</button>
            </div>
            <div class="space-y-6">
                <div class="relative">
                    <label id="input-label" class="block text-[10px] text-starry-soft uppercase font-bold mb-2 ml-1">ระบุจำนวนเงิน (บาท)</label>
                    <input type="number" id="price-input" placeholder="0.00" class="w-full bg-black/40 border-2 border-white/5 rounded-2xl px-6 py-5 text-3xl text-accent-miku font-black outline-none focus:border-accent-miku transition-all">
                </div>
                <button onclick="calculate()" class="w-full py-5 bg-gradient-to-r from-ocean-dark to-ocean-bright rounded-2xl font-black text-xl text-white shadow-2xl hover:brightness-125 active:scale-95 transition-all uppercase tracking-tighter">
                    Calculate Now
                </button>
                <div id="result-box" class="hidden mt-6 p-8 bg-gradient-to-br from-white/5 to-transparent border border-white/10 rounded-[2rem] text-center">
                    <p id="fee-display" class="text-xs text-starry-soft font-medium uppercase tracking-widest"></p>
                    <p id="result-text" class="text-5xl font-black text-white mt-3"></p>
                    <p id="label-final" class="text-[10px] text-accent-miku font-bold uppercase mt-2"></p>
                </div>
            </div>
        </section>

        <footer class="text-center space-y-8 pt-4">
            <div class="flex flex-col items-center gap-4">
                <a href="https://docs.google.com/spreadsheets/d/1-kKlNjdrTLPbQ0ogYQt7Fb-QtCoLyMmX0H57NfEOMwA/edit?usp=drivesdk" target="_blank" class="text-starry-soft hover:text-accent-miku text-xs underline decoration-accent-miku/30 underline-offset-8 transition-all">
                    คลิกเพื่อเช็คคิวงาน (Google Sheets)
                </a>
                <a href="https://www.facebook.com/share/" target="_blank" class="px-12 py-4 bg-white text-black rounded-full font-black text-sm hover:scale-105 transition-all shadow-xl uppercase">
                    Contact Fanpage
                </a>
            </div>
            <p class="text-[9px] text-starry-soft/30 tracking-[0.5em] uppercase font-medium">© 2026 TA RAY STORE. All rights reserved.</p>
        </footer>

        <button onclick="adminLogin()" class="fixed bottom-6 right-6 w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-accent-miku hover:text-black transition-all group border border-white/10">
            <svg class="w-4 h-4 opacity-30 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </button>
    </main>

    <script>
        // --- Admin System ---
        function adminLogin() {
            const pass = prompt("Enter Admin Password:");
            if (pass === "Talay1212") {
                document.getElementById('main-body').classList.add('is-admin');
                alert("โหมดแก้ไขเปิดใช้งานแล้ว!");
            } else {
                alert("รหัสผ่านไม่ถูกต้อง");
            }
        }

        // --- Firebase Logic ---
        function loadData() {
            if(!window.dbOnValue) return setTimeout(loadData, 500);
            window.dbOnValue(window.dbRef(window.db, 'siteData'), (snapshot) => {
                const data = snapshot.val() || {};
                if(data.logoUrl) { document.getElementById('display-logo').src = data.logoUrl; document.getElementById('input-logo-url').value = data.logoUrl; }
                if(data.rateImg) { document.getElementById('display-rate-img').src = data.rateImg; document.getElementById('input-rate-img').value = data.rateImg; }
                if(data.conditions) { document.getElementById('display-conditions').innerText = data.conditions; document.getElementById('input-conditions').value = data.conditions; }
            });
        }

        function saveLogo() { const url = document.getElementById('input-logo-url').value; window.dbSet(window.dbRef(window.db, 'siteData/logoUrl'), url).then(() => alert("อัปเดตโลโก้แล้ว")); }
        function saveImage() { const url = document.getElementById('input-rate-img').value; window.dbSet(window.dbRef(window.db, 'siteData/rateImg'), url).then(() => alert("บันทึกรูปเรทราคาแล้ว")); }
        function saveConditions() { const text = document.getElementById('input-conditions').value; window.dbSet(window.dbRef(window.db, 'siteData/conditions'), text).then(() => alert("บันทึกเงื่อนไขเรียบร้อย")); }

        // --- Calc Logic ---
        let mode = 'sell';
        function setCalcMode(m) {
            mode = m;
            document.getElementById('btn-sell').className = m === 'sell' ? "flex-1 py-4 rounded-2xl border-2 border-accent-miku bg-accent-miku/20 text-white font-bold" : "flex-1 py-4 rounded-2xl border-2 border-white/5 text-starry-soft";
            document.getElementById('btn-find').className = m === 'find' ? "flex-1 py-4 rounded-2xl border-2 border-accent-miku bg-accent-miku/20 text-white font-bold" : "flex-1 py-4 rounded-2xl border-2 border-white/5 text-starry-soft";
            document.getElementById('input-label').innerText = m === 'sell' ? "ระบุราคารหัสที่ต้องการลงขาย (บาท)" : "ระบุงบที่มีสำหรับหารหัส (บาท)";
            document.getElementById('result-box').classList.add('hidden');
        }

        function calculate() {
            const p = parseFloat(document.getElementById('price-input').value);
            if(!p || p <= 0) return alert("กรุณาระบุจำนวนเงิน");
            let fee = 0;
            if(mode === 'sell') {
                if (p <= 900) fee = 15;
                else if (p <= 1499) fee = 25;
                else if (p <= 1999) fee = 30;
                else if (p <= 2499) fee = 45;
                else if (p <= 4499) fee = 57;
                else if (p <= 5999) fee = 65;
                else if (p <= 7500) fee = 80;
                else if (p <= 8500) fee = 95;
                else if (p <= 9999) fee = 145;
                else if (p <= 13999) fee = p * 0.019;
                else if (p <= 18999) fee = p * 0.025;
                else if (p <= 29999) fee = p * 0.035;
                else if (p <= 49999) fee = p * 0.045;
                else if (p <= 69999) fee = p * 0.047;
                else if (p <= 99999) fee = p * 0.050;
                else fee = p * 0.055;
                document.getElementById('fee-display').innerText = "Service Fee: -" + Math.floor(fee).toLocaleString() + " THB";
                document.getElementById('result-text').innerText = Math.floor(p - fee).toLocaleString();
                document.getElementById('label-final').innerText = "You Will Get (ยอดเงินที่คุณจะได้รับ)";
            } else {
                if (p <= 900) fee = 40;
                else if (p <= 1900) fee = 57;
                else if (p <= 3500) fee = 75;
                else if (p <= 6000) fee = 90;
                else if (p <= 9000) fee = 120;
                else if (p <= 9999) fee = 145;
                else if (p <= 14999) fee = 170;
                else if (p <= 29999) fee = 200;
                else if (p <= 49999) fee = 250;
                else if (p <= 99999) fee = 275;
                else fee = 300;
                document.getElementById('fee-display').innerText = "Finding Fee: +" + fee.toLocaleString() + " THB";
                document.getElementById('result-text').innerText = (p + fee).toLocaleString();
                document.getElementById('label-final').innerText = "Total Payment (ยอดรวมที่ต้องชำระ)";
            }
            document.getElementById('result-box').classList.remove('hidden');
        }
        window.onload = loadData;
    </script>
</body>
</html>
