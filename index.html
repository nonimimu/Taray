<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TA RAY STORE</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme: {
extend: {
colors: {
dark: {
bg: '#001F3F',
card: '#003B5C',
border: '#0095D9'
},
accent: {
primary: '#0095D9',
blue: '#003B5C',
light: '#00BFFF',
white: '#ffffff'
}
}
}
}
}
</script>

<style>
body{
background: linear-gradient(135deg,#001F3F,#003B5C,#0095D9);
color:white;
font-family:'Mitr',sans-serif;
}
.glass-card{
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="max-w-3xl mx-auto p-6 space-y-8">

<!-- HEADER -->
<div class="text-center">
<h1 class="text-5xl font-bold">TA RAY STORE</h1>
<p class="mt-3 text-sm opacity-80">
ร้าน Ta Ray รับฝากขาย รับทำป้าย ฝากหาไอดี
</p>

<!-- ปุ่มเช็คคิว -->
<a href="https://docs.google.com/spreadsheets/d/1-kKlNjdrTLPbQ0ogYQt7Fb-QtCoLyMmX0H57NfEOMwA/edit?usp=drivesdk"
target="_blank"
class="inline-block mt-4 border-2 border-dashed border-white px-6 py-2 rounded-full">
เช็คคิวงาน
</a>
</div>

<!-- รูป (แอดมินเปลี่ยนได้) -->
<div class="text-center">
<img id="imgBanner" class="rounded-xl mx-auto" src="">
<input type="file" onchange="uploadImage(this)" class="mt-3">
</div>

<!-- ระบบคำนวณ -->
<div class="glass-card p-5 rounded-xl">
<h2 class="text-xl mb-3">คำนวณค่าฝาก</h2>

<select id="type" class="w-full p-2 text-black mb-2">
<option value="sell">ฝากขาย</option>
<option value="find">ฝากหา</option>
</select>

<input id="price" type="number" placeholder="ใส่ราคา"
class="w-full p-2 text-black mb-2">

<button onclick="calc()" class="bg-blue-500 w-full py-2 rounded">
คำนวณ
</button>

<p id="result" class="mt-3 text-center"></p>
</div>

</div>

<script type="module">
// Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD3G85TUx08gNtnZeJFh8167IJwpHa-Gkw",
authDomain: "tabay-f23b5.firebaseapp.com",
databaseURL: "https://tabay-f23b5-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "tabay-f23b5",
storageBucket: "tabay-f23b5.firebasestorage.app",
messagingSenderId: "846273537826",
appId: "1:846273537826:web:175184b06beb512824677b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// โหลดรูป
onValue(ref(db,"img"),snap=>{
if(snap.exists()){
document.getElementById("imgBanner").src=snap.val();
}
});

// อัปโหลด
window.uploadImage=function(input){
let pass=prompt("รหัสแอดมิน");
if(pass!=="taray12121") return alert("ผิด");

let reader=new FileReader();
reader.onload=e=>{
set(ref(db,"img"),e.target.result);
};
reader.readAsDataURL(input.files[0]);
}

</script>

<script>
// คำนวณจริงตามรูป

function calc(){
let type=document.getElementById("type").value;
let p=parseInt(document.getElementById("price").value);
let fee=0;

// ฝากขาย
if(type==="sell"){
if(p<=900) fee=15;
else if(p<=1499) fee=25;
else if(p<=1999) fee=30;
else if(p<=2499) fee=45;
else if(p<=4499) fee=57;
else if(p<=5999) fee=65;
else if(p<=7500) fee=80;
else if(p<=8500) fee=95;
else if(p<=9999) fee=145;
else if(p>=10000) fee=p*0.019;
}

// ฝากหา
else{
if(p<=900) fee=40;
else if(p<=1900) fee=57;
else if(p<=3500) fee=75;
else if(p<=6000) fee=90;
else if(p<=9000) fee=120;
else if(p<=9999) fee=145;
else if(p>=10000 && p<15000) fee=170;
else if(p<30000) fee=200;
else if(p<50000) fee=250;
else if(p<100000) fee=275;
else fee=300;
}

document.getElementById("result").innerText=
"ค่าบริการ: "+Math.floor(fee)+" บาท";
}
</script>

</body>
</html>
