<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ta Ray - คลังฝากขาย & หาไอดี</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { ocean: { deep: '#003B5C', bright: '#0095D9', dark: '#020617' } },
                    boxShadow: { 'glow-blue': '0 0 20px rgba(0, 149, 217, 0.4)' }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Mitr', sans-serif;
            background-color: #020617; color: #f1f5f9;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 59, 92, 0.3) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 149, 217, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
        }
        .text-gradient {
            background: linear-gradient(to right, #0095D9, #7DD3FC, #0095D9);
            -webkit-background-clip: text; color: transparent;
            animation: gradientMove 5s linear infinite;
            background-size: 200% auto;
        }
        @keyframes gradientMove { to { background-position: 200% center; } }
        .glass-card { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(15px); border: 1px solid rgba(0, 149, 217, 0.2); border-radius: 28px; }
        .sidebar { position: fixed; top: 0; left: -100%; width: 270px; height: 100%; background: rgba(2, 6, 23, 0.98); z-index: 1000; padding: 25px; transition: 0.4s; border-right: 1px solid rgba(0, 149, 217, 0.3); }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 14px; margin-bottom: 8px; background: rgba(0, 149, 217, 0.1); border-radius: 14px; color: #fff; }
        .hamburger-btn { position: fixed; top: 15px; left: 15px; z-index: 100; background: rgba(0, 59, 92, 0.8); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid #0095D9; color: white; cursor: pointer; }
        .delete-btn { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; width: 26px; height: 26px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 50; }
        body.admin-mode-active .delete-btn { display: flex; }
        [contenteditable="true"] { outline: none; border-bottom: 1px dashed #0095D9; }
    </style>
</head>
<body class="antialiased min-h-screen">

    <div class="hamburger-btn" onclick="toggleMenu()">☰</div>
    <div class="absolute top-4 right-4 opacity-10 cursor-pointer z-50" onclick="unlockAdmin()">🔑</div>

    <nav id="sidebar" class="sidebar">
        <div class="text-right text-3xl cursor-pointer mb-8 text-blue-400" onclick="toggleMenu()">×</div>
        <h2 class="font-bold text-gradient text-3xl mb-8">TA RAY</h2>
        <a href="#profile" onclick="toggleMenu()">🏠 หน้าหลัก</a>
        <a href="#calculator" onclick="toggleMenu()">🧮 เครื่องคำนวณเรท</a>
        <a href="#rates" onclick="toggleMenu()">📑 อัลบั้มเรทราคา</a>
    </nav>

    <main class="max-w-md mx-auto px-4 py-16 space-y-8 relative z-10">

        <header id="profile" class="text-center space-y-5">
            <div class="relative w-36 h-36 mx-auto group">
                <div class="absolute inset-0 bg-ocean-bright/20 rounded-full blur-2xl animate-pulse"></div>
                <img id="shop-profile-img" src="https://via.placeholder.com/150/003B5C/0095D9?text=Ta+Ray" class="w-full h-full object-cover rounded-full border-4 border-ocean-bright shadow-glow-blue relative z-10">
                
                <div id="edit-img-overlay" class="absolute inset-0 bg-black/70 text-white rounded-full hidden items-center justify-center text-xs z-20 cursor-pointer" onclick="document.getElementById('profile-upload').click()">เปลี่ยนรูป</div>
                <input type="file" id="profile-upload" class="hidden" accept="image/*" onchange="handleImageUpload(this, 'settings/profileImg')">
            </div>
            <h1 class="font-bold text-gradient text-5xl uppercase tracking-tighter">Ta Ray</h1>
            <div class="glass-card p-5 text-sm text-blue-100/80 leading-relaxed">
                <p class="font-bold text-ocean-bright mb-1 text-lg">ร้าน Ta Ray รับฝากขาย</p>
                <p id="shop-desc" contenteditable="false">รับทำป้ายฝากขาย ป้ายเรทต่างๆ ป้ายคิวอาร์ ปกเครดิต ป้ายไอดียังไม่รับทำ และรับหาไอดี</p>
            </div>
        </header>

        <section id="calculator" class="glass-card p-7 border-t-4 border-ocean-bright">
            <h3 class="text-xl font-semibold mb-6 flex items-center gap-2 text-blue-300">🧮 ระบบคำนวณเรทบริการ</h3>
            <div class="space-y-5 text-sm">
                <div>
                    <label class="text-blue-400 font-bold text-[11px] uppercase">ประเภทบริการ</label>
                    <select id="calc-type" class="w-full bg-ocean-dark border border-blue-500/30 rounded-2xl p-4 mt-2 text-white outline-none" onchange="calculatePrice()">
                        <option value="sell">ฝากขายไอดี (อิงเรท TABAY)</option>
                        <option value="find">หาไอดี (อิงเรท Ta Ray)</option>
                    </select>
                </div>
                <div>
                    <label class="text-blue-400 font-bold text-[11px] uppercase">จำนวนเงิน (บาท)</label>
                    <input type="number" id="calc-input" class="w-full bg-ocean-dark border border-blue-500/30 rounded-2xl p-4 mt-2 text-white outline-none" placeholder="ใส่จำนวนเงิน..." oninput="calculatePrice()">
                </div>
                <div class="bg-gradient-to-br from-blue-900/40 to-transparent rounded-3xl p-6 border border-blue-500/20 space-y-4">
                    <div class="flex justify-between items-center"><span>ค่าธรรมเนียม:</span><span id="fee-result" class="text-2xl font-bold text-ocean-bright">0 ฿</span></div>
                    <div class="flex justify-between items-center border-t border-blue-500/10 pt-4"><span id="total-text">เงินที่จะได้รับ:</span><span id="total-result" class="text-2xl font-bold text-green-400">0 ฿</span></div>
                </div>
            </div>
        </section>

        <section id="rates" class="glass-card p-7">
            <h3 class="text-xl font-semibold mb-6 text-blue-300">📑 อัลบั้มเรทราคา</h3>
            <div id="gallery-rates" class="grid grid-cols-2 gap-4"></div>
            <button class="w-full p-4 border-2 border-dashed border-blue-500/30 rounded-2xl text-xs text-blue-400 mt-4 hidden admin-mode-btn" onclick="document.getElementById('gallery-upload').click()">+ เพิ่มรูปเรทราคา</button>
            <input type="file" id="gallery-upload" class="hidden" accept="image/*" onchange="handleGalleryUpload(this)">
        </section>

        <footer class="flex gap-4">
            <a href="https://www.facebook.com/share/1EZsmNZvLi/?mibextid=wwXIfr" target="_blank" class="flex-1 bg-white/5 border border-white/10 py-4 rounded-2xl font-bold text-center">Facebook</a>
            <a href="#" class="flex-1 bg-white/5 border border-white/10 py-4 rounded-2xl font-bold text-center">Line</a>
        </footer>
    </main>

    <div id="admin-actions" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[1001] hidden">
        <button class="w-full bg-blue-600 text-white font-bold p-5 rounded-3xl shadow-2xl" onclick="exitEditMode()">บันทึกข้อมูลทั้งหมด ✅</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3G85TUx08gNtnZeJFh8167IJwpHa-Gkw",
            authDomain: "tabay-f23b5.firebaseapp.com",
            databaseURL: "https://tabay-f23b5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tabay-f23b5",
            storageBucket: "tabay-f23b5.firebasestorage.app",
            messagingSenderId: "846273537826",
            appId: "1:846273537826:web:175184b06beb512824677b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        // --- 1. โหลดข้อมูลแบบ Real-time (รีเว็บข้อมูลไม่หาย) ---
        db.ref('settings').on('value', snap => {
            const data = snap.val();
            if(data) {
                if(data.profileImg) document.getElementById('shop-profile-img').src = data.profileImg;
                if(data.description) document.getElementById('shop-desc').innerText = data.description;
            }
        });

        // --- 2. ระบบบันทึกรูปภาพ ---
        function handleImageUpload(input, dbPath) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const base64 = e.target.result;
                    // อัปเดตที่หน้าจอ
                    if(dbPath === 'settings/profileImg') document.getElementById('shop-profile-img').src = base64;
                    // บันทึกลง Firebase ทันที
                    db.ref(dbPath).set(base64);
                    alert("บันทึกรูปภาพเรียบร้อย!");
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function handleGalleryUpload(input) {
            if (input.files && input.files[0]) {
                const title = prompt("ระบุชื่อหรือช่วงราคาของรูปนี้ (เช่น เรท 500-900):");
                const reader = new FileReader();
                reader.onload = e => {
                    db.ref('galleries/rates').push({ imgUrl: e.target.result, title: title || "เรทราคา" });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- 3. ADMIN SYSTEM ---
        function unlockAdmin() {
            let pw = prompt("กรุณาใส่รหัสผ่านแอดมิน:");
            if (pw !== null && btoa(pw) === "VGFiYXkxMjEy") { // รหัส Tabay1212
                document.body.classList.add("admin-mode-active");
                document.getElementById('shop-desc').contentEditable = "true";
                document.querySelectorAll('.admin-mode-btn, #admin-actions, #edit-img-overlay').forEach(el => el.style.display = 'flex');
                alert("ยินดีต้อนรับ! คุณสามารถแก้ไขข้อมูลและเปลี่ยนรูปได้แล้ว");
            } else if(pw !== null) alert("รหัสผ่านไม่ถูกต้อง!");
        }

        function exitEditMode() {
            // บันทึกข้อความ
            const desc = document.getElementById('shop-desc').innerText;
            db.ref('settings/description').set(desc);

            document.body.classList.remove("admin-mode-active");
            document.getElementById('shop-desc').contentEditable = "false";
            document.querySelectorAll('.admin-mode-btn, #admin-actions, #edit-img-overlay, .delete-btn').forEach(el => el.style.display = 'none');
            alert("บันทึกข้อมูลและปิดโหมดแก้ไขเรียบร้อย!");
        }

        // --- 4. CALCULATOR & GALLERY SYNC ---
        function calculatePrice() {
            const type = document.getElementById('calc-type').value;
            const input = parseFloat(document.getElementById('calc-input').value) || 0;
            let fee = 0; let total = 0;
            if (type === 'sell') {
                document.getElementById('total-text').innerText = "เงินที่จะได้รับ:";
                if (input >= 500 && input <= 900) fee = 15;
                else if (input <= 1499) fee = 25; else if (input <= 1999) fee = 30;
                else if (input <= 2499) fee = 45; else if (input <= 4499) fee = 57;
                else if (input <= 5999) fee = 65; else if (input <= 7500) fee = 80;
                else if (input <= 8500) fee = 95; else if (input <= 9999) fee = 145;
                else if (input >= 100000) fee = input * 0.055; 
                else if (input >= 70000) fee = input * 0.05;
                else if (input >= 50000) fee = input * 0.047;
                else if (input >= 30000) fee = input * 0.045;
                else if (input >= 19000) fee = input * 0.035;
                else if (input >= 14000) fee = input * 0.025;
                else if (input >= 10000) fee = input * 0.019;
                total = input - fee;
            } else {
                document.getElementById('total-text').innerText = "ยอดจ่ายรวม:";
                if (input >= 1 && input <= 900) fee = 40; 
                else if (input <= 1900) fee = 57; else if (input <= 3500) fee = 75;
                else if (input <= 6000) fee = 90; else if (input <= 9000) fee = 120;
                else if (input <= 9999) fee = 145; else if (input >= 100000) fee = 300;
                else if (input >= 50000) fee = 275; else if (input >= 30000) fee = 250;
                else if (input >= 15000) fee = 200; else if (input >= 10000) fee = 170;
                total = input + fee;
            }
            document.getElementById('fee-result').innerText = Math.round(fee).toLocaleString() + " ฿";
            document.getElementById('total-result').innerText = Math.round(total).toLocaleString() + " ฿";
        }

        db.ref('galleries/rates').on('value', snap => {
            const cont = document.getElementById('gallery-rates');
            cont.innerHTML = '';
            snap.forEach(child => {
                const d = child.val();
                cont.innerHTML += `
                    <div class="relative bg-white/5 p-2 rounded-2xl border border-white/10">
                        <button class="delete-btn" onclick="deleteItem('${child.key}')">✕</button>
                        <img src="${d.imgUrl}" class="w-full aspect-[3/4] object-cover rounded-xl" onclick="window.open(this.src)">
                        <p class="text-[10px] text-center mt-2 opacity-50">${d.title}</p>
                    </div>`;
            });
        });

        function deleteItem(key) { if(confirm("ลบรูปนี้ใช่ไหม?")) db.ref('galleries/rates/'+key).remove(); }
    </script>
</body>
</html>
