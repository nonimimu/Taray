<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ta Ray Cosmic Store - โฉมใหม่เริ่ดกว่าเดิม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            deep: '#0F172A',    /* Dark Blue Deep */
                            glass: 'rgba(255, 255, 255, 0.1)',
                            sky: '#BAE6FD',     /* Light Sky Blue */
                            white: '#F0F9FF'    /* White Cloud */
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 10s linear infinite',
                        'spin-reverse': 'spin-reverse 12s linear infinite',
                        'float': 'float 5s ease-in-out infinite',
                    },
                    keyframes: {
                        'spin-reverse': {
                            from { transform: rotate(360deg); },
                            to { transform: rotate(0deg); }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Mitr', sans-serif !important;
            background: #0B132B;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(186, 230, 253, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(58, 80, 107, 0.2) 0%, transparent 40%);
            background-attachment: fixed;
            color: #F0F9FF;
        }
        .eng-heading { font-family: 'Playfair Display', serif !important; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(186, 230, 253, 0.2);
            border-radius: 35px;
        }

        .heading-underline {
            position: relative;
            display: inline-flex;
            padding-bottom: 10px;
        }
        .heading-underline::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 50px; height: 3px;
            background: linear-gradient(90deg, #BAE6FD, transparent);
            border-radius: 99px;
            box-shadow: 0 0 10px #BAE6FD;
        }

        .text-gradient {
            background: linear-gradient(to right, #FFFFFF, #BAE6FD, #FFFFFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .delete-btn { display: none; position: absolute; top: 10px; right: 10px; background: #FF4B4B; color: white; padding: 5px 12px; border-radius: 12px; font-size: 12px; z-index: 50; }
        body.admin-mode-active .delete-btn, body.admin-mode-active .admin-only { display: block !important; }
    </style>
</head>
<body class="antialiased selection:bg-sky-400 selection:text-white">

    <main class="max-w-2xl mx-auto px-5 py-12 relative z-10 space-y-12">
        
        <header class="text-center space-y-6">
            <div class="relative w-40 h-40 mx-auto group">
                <div class="absolute inset-[-10px] border border-sky-400/30 rounded-full animate-spin-slow"></div>
                <div class="absolute inset-[-4px] border border-white/40 rounded-full animate-spin-reverse"></div>
                <div class="absolute inset-0 bg-sky-400/10 rounded-full blur-2xl"></div>
                
                <img id="shop-profile-img" src="https://via.placeholder.com/150" class="w-full h-full object-cover rounded-full border-2 border-white relative z-10">
                
                <div id="edit-img-overlay" class="absolute inset-0 bg-black/70 text-white rounded-full hidden flex-col items-center justify-center text-[10px] z-20 cursor-pointer admin-only" onclick="document.getElementById('profile-upload').click()">
                    เปลี่ยนรูป
                </div>
                <input type="file" id="profile-upload" class="hidden" accept="image/*" onchange="uploadProfileImg(this)">
            </div>

            <div class="space-y-2">
                <h1 class="eng-heading text-6xl font-bold text-gradient">Ta Ray</h1>
                <p class="eng-heading text-sm tracking-[0.4em] text-sky-300 uppercase opacity-80">Cosmic Service</p>
            </div>

            <div class="glass-panel p-6 max-w-md mx-auto relative overflow-hidden group">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-sky-400/50 to-transparent"></div>
                <p id="shop-desc" contenteditable="false" class="text-sm leading-relaxed text-white/80">รับทำป้ายฝากขาย ป้ายเรทต่างๆ ป้ายคิวอาร์ ปกเครดิต ป้ายไอดียังไม่รับทำ และรับหาไอดีตามความต้องการของคุณ</p>
            </div>
        </header>

        <section class="glass-panel p-8 space-y-6">
            <h3 class="text-2xl font-bold heading-underline flex items-center gap-3">
                ตารางคิวงาน
            </h3>
            <a href="https://docs.google.com/spreadsheets/d/1-kKlNjdrTLPbQ0ogYQt7Fb-QtCoLyMmX0H57NfEOMwA/edit?usp=drivesdk" target="_blank" class="block w-full py-4 bg-sky-400/10 border border-sky-400/40 rounded-2xl text-center font-bold text-sky-300 hover:bg-sky-400 hover:text-white transition-all shadow-lg">
                ดูคิวงานแบบ Real-time ✨
            </a>
            <div id="queue-details" contenteditable="false" class="p-4 bg-white/5 rounded-xl border border-white/10 text-sm text-white/70 italic">
                (กำลังโหลดข้อมูล...)
            </div>
        </section>

        <section class="glass-panel p-8 space-y-8">
            <h3 class="text-2xl font-bold heading-underline">เครื่องคำนวณยอดเงิน</h3>
            <div class="grid grid-cols-1 gap-6">
                <div class="space-y-2">
                    <label class="text-xs uppercase tracking-widest text-sky-400 font-bold ml-1">ประเภทบริการ</label>
                    <select id="calc-type" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl p-4 outline-none focus:border-sky-400 transition-all" onchange="calculatePrice()">
                        <option value="sell">ฝากขายไอดี (TABAY RATE)</option>
                        <option value="find">หาไอดีให้ (TA RAY RATE)</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs uppercase tracking-widest text-sky-400 font-bold ml-1">จำนวนเงิน</label>
                    <input type="number" id="calc-input" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl p-4 text-xl font-bold outline-none focus:border-sky-400" placeholder="0" oninput="calculatePrice()">
                </div>
                <div class="bg-sky-400/5 rounded-3xl p-6 border border-sky-400/20 space-y-4">
                    <div class="flex justify-between text-sm">
                        <span class="opacity-60">ค่าธรรมเนียม:</span>
                        <span id="fee-result" class="font-bold text-sky-300">0 ฿</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-white/10 pt-4">
                        <span class="font-bold">ยอดสุทธิที่ได้รับ:</span>
                        <span id="total-result" class="text-4xl font-bold text-white drop-shadow-md">0 ฿</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="space-y-6">
            <h3 class="text-2xl font-bold heading-underline">อัลบั้มเรทราคา</h3>
            <div id="gallery-rates" class="grid grid-cols-1 gap-8">
                </div>
            <button class="w-full p-5 border-2 border-dashed border-sky-400/30 rounded-3xl text-sky-300 text-sm font-bold admin-only hidden" onclick="document.getElementById('gallery-upload').click()">
                + เพิ่มรูปเรทราคา
            </button>
            <input type="file" id="gallery-upload" class="hidden" accept="image/*" onchange="uploadGalleryImg(this)">
        </section>

        <footer class="grid grid-cols-2 gap-4 pb-20">
            <a href="https://www.facebook.com/share/1EZsmNZvLi/?mibextid=wwXIfr" target="_blank" class="p-4 glass-panel text-center font-bold hover:bg-sky-400/20 transition-all border-none">Facebook</a>
            <a href="#" class="p-4 glass-panel text-center font-bold hover:bg-sky-400/20 transition-all border-none">Line</a>
            <button onclick="unlockAdmin()" class="col-span-2 text-[10px] opacity-20 hover:opacity-100">Admin Login</button>
        </footer>

    </main>

    <div id="admin-actions" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs z-[1000] hidden">
        <button class="w-full bg-white text-slate-900 font-bold py-4 rounded-2xl shadow-2xl" onclick="exitEditMode()">
            บันทึกข้อมูลและปิด ✅
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3G85TUx08gNtnZeJFh8167IJwpHa-Gkw",
            authDomain: "tabay-f23b5.firebaseapp.com",
            databaseURL: "https://tabay-f23b5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tabay-f23b5",
            storageBucket: "tabay-f23b5.firebasestorage.app",
            messagingSenderId: "846273537826",
            appId: "1:846273537826:web:175184b06beb512824677b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Load Settings
        db.ref('settings').on('value', snap => {
            const data = snap.val();
            if(data) {
                if(data.profileImg) document.getElementById('shop-profile-img').src = data.profileImg;
                if(data.description) document.getElementById('shop-desc').innerText = data.description;
                if(data.queueDetails) document.getElementById('queue-details').innerHTML = data.queueDetails;
            }
        });

        // Load Gallery
        db.ref('galleries/rates').on('value', snap => {
            const cont = document.getElementById('gallery-rates');
            cont.innerHTML = '';
            snap.forEach(child => {
                cont.innerHTML += `
                    <div class="relative glass-panel p-4 overflow-hidden group">
                        <button class="delete-btn" onclick="deleteItem('${child.key}')">ลบรูป</button>
                        <img src="${child.val().imgUrl}" class="w-full h-auto rounded-2xl shadow-lg group-hover:scale-[1.02] transition-transform">
                    </div>`;
            });
        });

        // Admin Functions
        function unlockAdmin() {
            let pw = prompt("รหัสแอดมิน:");
            if (pw !== null && btoa(pw) === "VGFiYXkxMjEy") {
                document.body.classList.add("admin-mode-active");
                document.getElementById('shop-desc').contentEditable = "true";
                document.getElementById('queue-details').contentEditable = "true";
                document.getElementById('admin-actions').classList.remove('hidden');
                alert("โหมดแอดมินเปิดแล้ว!");
            }
        }

        function exitEditMode() {
            db.ref('settings').update({
                description: document.getElementById('shop-desc').innerText,
                queueDetails: document.getElementById('queue-details').innerHTML
            });
            document.body.classList.remove("admin-mode-active");
            document.getElementById('admin-actions').classList.add('hidden');
            document.getElementById('shop-desc').contentEditable = "false";
            document.getElementById('queue-details').contentEditable = "false";
            alert("บันทึกสำเร็จ!");
        }

        function uploadProfileImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => db.ref('settings/profileImg').set(e.target.result);
                reader.readAsDataURL(input.files[0]);
            }
        }

        function uploadGalleryImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => db.ref('galleries/rates').push({ imgUrl: e.target.result });
                reader.readAsDataURL(input.files[0]);
            }
        }

        function deleteItem(key) { if(confirm("ลบรูปนี้?")) db.ref('galleries/rates/'+key).remove(); }

        // Calculator Logic
        function calculatePrice() {
            const type = document.getElementById('calc-type').value;
            const input = parseFloat(document.getElementById('calc-input').value) || 0;
            let fee = 0; let total = 0;
            if (type === 'sell') {
                if (input >= 100000) fee = input * 0.055;
                else if (input >= 70000) fee = input * 0.050;
                else if (input >= 50000) fee = input * 0.047;
                else if (input >= 30000) fee = input * 0.045;
                else if (input >= 19000) fee = input * 0.035;
                else if (input >= 14000) fee = input * 0.025;
                else if (input >= 10000) fee = input * 0.019;
                else if (input >= 8501) fee = 145;
                else if (input >= 7501) fee = 95;
                else if (input >= 6000) fee = 80;
                else if (input >= 4500) fee = 65;
                else if (input >= 2500) fee = 57;
                else if (input >= 2000) fee = 45;
                else if (input >= 1500) fee = 30;
                else if (input >= 1000) fee = 25;
                else if (input >= 500) fee = 15;
                total = input - fee;
            } else {
                if (input >= 100000) fee = 300;
                else if (input >= 50000) fee = 275;
                else if (input >= 30000) fee = 250;
                else if (input >= 15000) fee = 200;
                else if (input >= 10000) fee = 170;
                else if (input >= 9001) fee = 145;
                else if (input >= 6001) fee = 120;
                else if (input >= 3501) fee = 90;
                else if (input >= 1901) fee = 75;
                else if (input >= 901) fee = 57;
                else if (input >= 1) fee = 40;
                total = input + fee;
            }
            document.getElementById('fee-result').innerText = Math.round(fee).toLocaleString() + " ฿";
            document.getElementById('total-result').innerText = Math.round(total).toLocaleString() + " ฿";
        }
    </script>
</body>
</html>
